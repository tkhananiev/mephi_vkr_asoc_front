
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        expires off;
        try_files $uri =404;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ @spa;
    }

    location @spa {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        expires off;
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    location /auth/ {
        proxy_pass http://auth-service:8091;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/integrations {
        proxy_pass http://api-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
    location /api/v1/scans {
        proxy_pass http://api-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
    location /api/v1/console {
        proxy_pass http://api-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
    location /api/v1/admin/ {
        proxy_pass http://api-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
    location /openapi.yaml {
        proxy_pass http://api-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /swagger {
        proxy_pass http://api-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /health {
        proxy_pass http://api-service:8080;
        proxy_http_version 1.1;
    }
    location = /health/auth {
        proxy_pass http://auth-service:8091/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /health/reference {
        proxy_pass http://reference-data-service:8081/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /health/processing {
        proxy_pass http://processing-service:8082/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /health/jira {
        proxy_pass http://jira-integration-service:8083/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /health/semgrep {
        proxy_pass http://semgrep-service:8085/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /health/gitleaks {
        proxy_pass http://gitleaks-service:8086/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /health/trivy-sca {
        proxy_pass http://trivy-sca-service:8088/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /health/zap-dast {
        proxy_pass http://zap-dast-service:8089/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/v1/sync {
        proxy_pass http://reference-data-service:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /api/v1/findings/ingest {
        proxy_pass http://api-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 32m;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /api/v1/findings {
        proxy_pass http://processing-service:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /api/v1/groups {
        proxy_pass http://api-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/v1/report {
        proxy_pass http://api-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /jira {
        return 302 /jira/;
    }
    location /jira/ {
        proxy_pass http://jira-mock:8090/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/tickets {
        proxy_pass http://jira-integration-service:8083;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
