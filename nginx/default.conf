# Nginx внутри образа asoc/web — для Kubernetes (тот namespace, что и бэкенды).
# Upstream-имена = Service в кластере (порт — как в workloads.yaml).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Статика React (SPA): несуществующие пути → index.html для клиентского роутера.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # api-service: сценарии сканирования и оркестрация.
    location /api/v1/scans {
        proxy_pass http://api-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
    # api-service: спецификация OpenAPI (тот же хост, что и UI).
    location /openapi.yaml {
        proxy_pass http://api-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    # api-service: Swagger UI.
    location /swagger {
        proxy_pass http://api-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    # api-service: проверка живости (общая).
    location /health {
        proxy_pass http://api-service:8080;
        proxy_http_version 1.1;
    }
    # Агрегированные health для страницы «Сервисы» (тот же паттерн, что nginx-host).
    location = /health/reference {
        proxy_pass http://reference-data-service:8081/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /health/processing {
        proxy_pass http://processing-service:8082/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /health/jira {
        proxy_pass http://jira-integration-service:8083/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /health/semgrep {
        proxy_pass http://semgrep-service:8085/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # reference-data-service: синхронизация справочников (NVD, БДУ); долгие запросы.
    location /api/v1/sync {
        proxy_pass http://reference-data-service:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # processing-service: находки и ingest.
    location /api/v1/findings {
        proxy_pass http://processing-service:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    # processing-service: группы уязвимостей.
    location /api/v1/groups {
        proxy_pass http://processing-service:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    # processing-service: отчёт по уязвимостям.
    location /api/v1/report {
        proxy_pass http://processing-service:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # jira-integration-service: создание и учёт тикетов.
    location /api/v1/tickets {
        proxy_pass http://jira-integration-service:8083;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
