# Nginx внутри образа asoc/web — для Kubernetes (тот namespace, что и бэкенды).
# Upstream-имена = Service в кластере (порт — как в workloads.yaml).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # После деплоя index.html должен подтягивать новый hashed JS/CSS, иначе «залипает» старый бандл.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        expires off;
        try_files $uri =404;
    }

    # Vite: имена файлов с хешом — можно кешировать навсегда.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Статика React (SPA): fallback на index.html без долгого кэша HTML (иначе старый index → 404 на /assets/*‑хеш.js и белый экран).
    location / {
        try_files $uri $uri/ @spa;
    }

    location @spa {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        expires off;
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    # auth-service: пользовательский и Atomic-admin вход (/auth/v1/...).
    location /auth/ {
        proxy_pass http://auth-service:8091;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # api-service: каталог интеграций (сканеров).
    location /api/v1/integrations {
        proxy_pass http://api-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
    # api-service: сценарии сканирования и оркестрация.
    location /api/v1/scans {
        proxy_pass http://api-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
    # api-service: продукты консоли (PostgreSQL, per JWT user).
    location /api/v1/console {
        proxy_pass http://api-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
    location /api/v1/admin/ {
        proxy_pass http://api-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
    # api-service: спецификация OpenAPI (тот же хост, что и UI).
    location /openapi.yaml {
        proxy_pass http://api-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    # api-service: Swagger UI.
    location /swagger {
        proxy_pass http://api-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    # api-service: проверка живости (общая).
    location /health {
        proxy_pass http://api-service:8080;
        proxy_http_version 1.1;
    }
    location = /health/auth {
        proxy_pass http://auth-service:8091/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    # Агрегированные health для страницы «Сервисы» (тот же паттерн, что nginx-host).
    location = /health/reference {
        proxy_pass http://reference-data-service:8081/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /health/processing {
        proxy_pass http://processing-service:8082/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /health/jira {
        proxy_pass http://jira-integration-service:8083/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /health/semgrep {
        proxy_pass http://semgrep-service:8085/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /health/gitleaks {
        proxy_pass http://gitleaks-service:8086/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /health/trivy-sca {
        proxy_pass http://trivy-sca-service:8088/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /health/zap-dast {
        proxy_pass http://zap-dast-service:8089/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # reference-data-service: синхронизация справочников (NVD, БДУ); долгие запросы.
    location /api/v1/sync {
        proxy_pass http://reference-data-service:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Публичный ingest (X-API-Key / JWT) — только api-service дальше в Kafka/processing.
    # Иначе префикс /api/v1/findings ушёл бы в processing-service и давал бы 404 при выкл. HTTP-ingest.
    location /api/v1/findings/ingest {
        proxy_pass http://api-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 32m;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # processing-service: находки (кроме ingest выше).
    location /api/v1/findings {
        proxy_pass http://processing-service:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    # api-service: группы уязвимостей (прокси в processing с учётом JWT пользователя).
    location /api/v1/groups {
        proxy_pass http://api-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # api-service: отчёт по уязвимостям (пер-user).
    location /api/v1/report {
        proxy_pass http://api-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # jira-mock: через тот же Ingress, что и приложение (asoc-web nginx снимает префикс /jira/).
    location = /jira {
        return 302 /jira/;
    }
    location /jira/ {
        proxy_pass http://jira-mock:8090/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # jira-integration-service: создание и учёт тикетов.
    location /api/v1/tickets {
        proxy_pass http://jira-integration-service:8083;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
